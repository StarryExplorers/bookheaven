<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Book - BookHeaven</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="BookHeaven Logo">
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="search.html">Search</a>
                <a href="upload.html">Upload Book</a>
                <a href="account.html">My Account</a>
                <button id="sign-out-btn" onclick="signOut()">Sign Out</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="upload-form">
            <h1>Upload Your Book</h1>
            <form onsubmit="uploadBook(event)">
                <label for="book-title">Book Title:</label>
                <input type="text" id="book-title" required>

                <label for="book-author">Book Author:</label>
                <input type="text" id="book-author" required>

                <label for="book-genre">Book Genre:</label>
                <input type="text" id="book-genre">

                <label for="book-file">Upload Book File:</label>
                <input type="file" id="book-file" required>

                <button type="submit">Upload Book</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 BookHeaven. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
                  </html>
