<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | BookHeaven</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="auth.js"></script>
</head>
<body class="auth-body">
  <div class="auth-container">
    <h1>Welcome Back to BookHeaven</h1>
    <form id="login-form" class="auth-form">
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Log In</button>
      <p class="switch-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </form>

    <div class="social-login">
      <p>Or log in with:</p>
      <button class="google-btn">Google</button>
      <button class="email-btn">Email Magic Link</button>
    </div>
  </div>
</body>
</html>
