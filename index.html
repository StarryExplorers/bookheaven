<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookHeaven</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>BookHeaven</h1>
    <nav>
      <button onclick="showUploadForm()">Upload Book</button>
      <button onclick="showLibrary()">View Library</button>
    </nav>
  </header>

  <main>
    <section id="uploadSection" class="hidden">
      <h2>Upload a Book</h2>
      <input type="text" id="bookTitle" placeholder="Book Title" />
      <input type="file" id="bookFile" />
      <button onclick="uploadBook()">Upload</button>
    </section>

    <section id="librarySection">
      <h2>Library</h2>
      <ul id="bookList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
  </html>
